name: CI / Deploy

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck shared
        run: npm run typecheck --workspace=shared

      - name: Test shared
        run: npm run test --workspace=shared

      - name: Typecheck backend
        run: npm run typecheck --workspace=packages/backend

      - name: Test backend extract path
        run: npm run test --workspace=packages/backend -- src/functions/ai/__tests__/extract.test.js --runInBand

      - name: Typecheck web
        run: npm run typecheck --workspace=packages/web

      - name: Test web add extraction flow
        run: npm run test --workspace=packages/web -- src/pages/__tests__/AddCouponPage.test.tsx

      - name: Typecheck mobile
        run: npm run typecheck --workspace=packages/mobile

  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Set up Python (for SAM)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Bundle Lambda functions
        working-directory: packages/backend
        run: node scripts/bundle.mjs

      - name: SAM build
        working-directory: packages/backend
        run: sam build

      - name: SAM deploy
        working-directory: packages/backend
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Stage=dev" \
              "GoogleClientId=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "WebAppUrl=${{ vars.WEB_APP_URL || 'http://localhost:5173' }}" \
              "GeminiApiKey=${{ secrets.GEMINI_API_KEY }}"
