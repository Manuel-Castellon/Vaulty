name: Backend

on:
  push:
    branches: ["**"]
    paths: ["packages/backend/**", "shared/**"]
  pull_request:
    paths: ["packages/backend/**", "shared/**"]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run test --workspace=shared
      - run: npm run typecheck --workspace=packages/backend
      - run: npm run test --workspace=packages/backend
