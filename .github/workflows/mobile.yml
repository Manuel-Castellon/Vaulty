name: Mobile

on:
  push:
    branches: [main]
    paths: ["packages/mobile/**", "shared/**"]
  pull_request:
    paths: ["packages/mobile/**", "shared/**"]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace=packages/mobile

  build-android:
    if: github.ref == 'refs/heads/main'
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - run: eas build --platform android --non-interactive
        working-directory: packages/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.API_URL }}
