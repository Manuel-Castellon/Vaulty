name: Mobile

on:
  push:
    branches: ["**"]
    paths: ["packages/mobile/**", "shared/**"]
  pull_request:
    paths: ["packages/mobile/**", "shared/**"]
  workflow_dispatch:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run test --workspace=shared
      - run: npm run typecheck --workspace=packages/mobile

  bundle_check:
    name: JS Bundle Check (production)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Preflight (expo-doctor + prebuild)
        working-directory: packages/mobile
        run: npm run preflight:android
      - name: Production bundle (catches Metro/codegen errors before EAS)
        working-directory: packages/mobile
        run: npx expo export --platform android --output-dir /tmp/vaulty-bundle-check --clear

  android_preview_build:
    name: Android Preview Build (EAS)
    runs-on: ubuntu-latest
    needs: bundle_check
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Start Android preview build in cloud
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive --no-wait
