AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Vaulty Coupon Manager API

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref CouponsTable
        REGION: !Ref AWS::Region
        USER_POOL_ID: !Ref CognitoUserPool
        IMAGES_BUCKET: !Ref CouponImagesBucket
        GEMINI_API_KEY: !Ref GeminiApiKey
        BEDROCK_ENABLED: !Ref BedrockEnabled
        BEDROCK_MODEL_ID: !Ref BedrockModelId
  Api:
    Auth:
      DefaultAuthorizer: CognitoAuthorizer
      Authorizers:
        CognitoAuthorizer:
          UserPoolArn: !GetAtt CognitoUserPool.Arn
      AddDefaultAuthorizerToCorsPreflight: false
    Cors:
      AllowOrigin: "'*'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"

Parameters:
  Stage:
    Type: String
    Default: dev
  GeminiApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Google Gemini API key for AI extraction (legacy fallback)
  BedrockEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Set to true to use Textract + Bedrock extraction pipeline"
  BedrockModelId:
    Type: String
    Default: "anthropic.claude-3-haiku-20240307-v1:0"
    Description: Bedrock model ID for semantic extraction
  GoogleClientId:
    Type: String
    Default: ""
    Description: Google OAuth 2.0 Client ID (leave empty to skip Google SSO)
  GoogleClientSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Google OAuth 2.0 Client Secret
  WebAppUrl:
    Type: String
    Default: "http://localhost:5173"
    Description: Web app origin URL (used for OAuth callback)

Conditions:
  HasGoogleProvider: !Not [!Equals [!Ref GoogleClientId, ""]]

Resources:

  # ── Database ──────────────────────────────────────────────────────────────
  CouponsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "coupons-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── Auth (Cognito) ────────────────────────────────────────────────────────
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "vaulty-users-${Stage}"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: false

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "vaulty-${Stage}-${AWS::AccountId}"
      UserPoolId: !Ref CognitoUserPool

  CognitoGoogleProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: HasGoogleProvider
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "email openid profile"
      AttributeMapping:
        email: email
        name: name
        picture: picture

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CognitoGoogleProvider
    Properties:
      ClientName: !Sub "vaulty-client-${Stage}"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
        - !If [HasGoogleProvider, Google, !Ref AWS::NoValue]
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Sub "${WebAppUrl}/auth/callback"
        - "http://localhost:5173/auth/callback"
        - "http://localhost:3000/auth/callback"
      LogoutURLs:
        - !Sub "${WebAppUrl}/"
        - "http://localhost:5173/"
        - "http://localhost:3000/"
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30

  # ── Storage (S3) ──────────────────────────────────────────────────────────
  CouponImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "vaulty-images-${Stage}-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedOrigins: ["*"]
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOrphanedUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1

  # ── Coupon Lambdas ────────────────────────────────────────────────────────
  ListCouponsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: list.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CouponsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /coupons
            Method: GET

  GetCouponFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: get.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CouponsTable
        - S3ReadPolicy:
            BucketName: !Ref CouponImagesBucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /coupons/{id}
            Method: GET

  CreateCouponFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: create.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CouponsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /coupons
            Method: POST

  UpdateCouponFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: update.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CouponsTable
        - S3ReadPolicy:
            BucketName: !Ref CouponImagesBucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /coupons/{id}
            Method: PUT

  DeleteCouponFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: delete.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CouponsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /coupons/{id}
            Method: DELETE

  # ── Notifications Lambda ──────────────────────────────────────────────────
  RegisterTokenFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: register-token.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CouponsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /push-token
            Method: POST

  NotificationPreferencesFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: preferences.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CouponsTable
      Events:
        GetPrefs:
          Type: Api
          Properties:
            Path: /notifications/preferences
            Method: GET
        PutPrefs:
          Type: Api
          Properties:
            Path: /notifications/preferences
            Method: PUT

  ExpiryCheckFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: expiry-check.handler
      Timeout: 300
      Environment:
        Variables:
          EXPIRY_DAYS_THRESHOLD: "3"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CouponsTable
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Description: Daily check for coupons expiring within 3 days
            Enabled: true

  # ── AI Lambda ────────────────────────────────────────────────────────────
  SearchFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: search.handler
      Timeout: 30
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CouponsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /search
            Method: POST

  ExtractFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: extract.handler
      # 60 s covers Textract sync (images) + Bedrock + QR.
      # PDF async Textract polls up to ~25 s; very large PDFs may still hit
      # the API Gateway 29 s limit — use the s3Key flow for those.
      Timeout: 60
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref CouponImagesBucket
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"
      Events:
        Api:
          Type: Api
          Properties:
            Path: /extract
            Method: POST

  # ── Upload Lambda ─────────────────────────────────────────────────────────
  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: presigned-url.handler
      Policies:
        - S3WritePolicy:
            BucketName: !Ref CouponImagesBucket
      Events:
        Api:
          Type: Api
          Properties:
            Path: /upload-url
            Method: GET

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  CouponsTableName:
    Value: !Ref CouponsTable
  UserPoolId:
    Description: Cognito User Pool ID (needed by frontend)
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: Cognito App Client ID (needed by frontend)
    Value: !Ref CognitoUserPoolClient
  CognitoDomain:
    Description: Cognito hosted UI domain (needed by frontend for Google SSO)
    Value: !Sub "vaulty-${Stage}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com"
  ImagesBucketName:
    Value: !Ref CouponImagesBucket
